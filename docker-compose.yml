services:
  openclaw:
    build: .
    container_name: openclaw
    restart: unless-stopped
    ports:
      - "18789:18789"
    volumes:
      - ./build/openclaw.json:/root/.openclaw-config/openclaw.json:ro
      - ./workspace:/initial-workspace:ro
      - ./build:/build-files:ro
      - openclaw_workspace:/root/.openclaw/workspace
      - ./data/agents:/root/.openclaw/agents
      - ./data/cron:/root/.openclaw/cron
      - ./data/gog:/root/.config/gogcli
      - ./build/himalaya-config.toml:/run/secrets/himalaya_config:ro
    environment:
      - GOG_KEYRING_PASSWORD
      - GOG_ACCOUNT

  gpt2giga:
    profiles: ["gigachat"]
    image: ghcr.io/ai-forever/gpt2giga:latest
    container_name: gpt2giga
    restart: unless-stopped
    env_file:
      - build/.env.gpt2giga

volumes:
  openclaw_workspace:
